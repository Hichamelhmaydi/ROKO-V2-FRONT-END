<div class="login-container">
  <div class="login-ornament">
    <p class="eyebrow">ROKO EXPERIENCE</p>
    <h1>Voyager commence par une belle entrée.</h1>
    <p class="lead">Connectez-vous pour retrouver vos destinations, vos réservations et votre rythme d'aventure.</p>
  </div>

  <div class="login-card">
    <h2>Connexion</h2>
    <p class="intro">Content de vous revoir.</p>

    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          [(ngModel)]="email"
          name="email"
          placeholder="votre@email.com"
          required>
      </div>

      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input
          type="password"
          id="password"
          [(ngModel)]="password"
          name="password"
          placeholder="••••••••"
          required>
      </div>

      @if (errorMessage) {
        <div class="error-message">
          <p class="error-title">{{ errorMessage.title }}</p>
          <p class="error-text">{{ errorMessage.message }}</p>
        </div>
      }

      <button type="submit" [disabled]="loading" class="btn-primary">
        @if (!loading) {
          <span>Se connecter</span>
        }
        @if (loading) {
          <span>Connexion...</span>
        }
      </button>
    </form>

    <p class="register-link">
      Pas encore de compte ? <a routerLink="/register">S'inscrire</a>
    </p>
  </div>
</div>
