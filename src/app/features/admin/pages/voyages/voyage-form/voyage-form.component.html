<div class="page-header">
  <h1>{{ isEdit ? 'Modifier le Voyage' : 'Nouveau Voyage' }}</h1>
  <a routerLink="/admin/voyages" class="btn-back">Retour à la liste</a>
</div>

<div class="form-card">
  <form (ngSubmit)="onSubmit()">
    <div class="form-row">
      <div class="form-group">
        <label for="nom">Nom du voyage *</label>
        <input
          type="text"
          id="nom"
          [(ngModel)]="voyage.nom"
          name="nom"
          placeholder="Ex: Escapade à Marrakech"
          required>
      </div>

      <div class="form-group">
        <label for="destination">Destination *</label>
        <input
          type="text"
          id="destination"
          [(ngModel)]="voyage.destination"
          name="destination"
          placeholder="Ex: Marrakech, Maroc"
          required>
      </div>
    </div>

    <div class="form-group">
      <label for="description">Description</label>
      <textarea
        id="description"
        [(ngModel)]="voyage.description"
        name="description"
        rows="4"
        placeholder="Décrivez le voyage..."></textarea>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="dateDepart">Date de départ *</label>
        <input
          type="date"
          id="dateDepart"
          [(ngModel)]="voyage.dateDepart"
          name="dateDepart"
          required>
      </div>

      <div class="form-group">
        <label for="dateRetour">Date de retour *</label>
        <input
          type="date"
          id="dateRetour"
          [(ngModel)]="voyage.dateRetour"
          name="dateRetour"
          required>
      </div>
    </div>

    <div class="form-group">
      <label for="prixBase">Prix de base (MAD) *</label>
      <input
        type="number"
        id="prixBase"
        [(ngModel)]="voyage.prixBase"
        name="prixBase"
        min="0"
        step="0.01"
        required>
    </div>

    <div class="form-group">
      <label for="image">Image du voyage</label>
      <input
        type="file"
        id="image"
        (change)="onFileSelected($event)"
        accept="image/*"
        #fileInput>
      <div class="image-preview" *ngIf="imagePreview || voyage.cover">
        <img [src]="imagePreview || voyage.cover" alt="Aperçu">
        <button type="button" (click)="removeImage()" class="btn-remove-image">Supprimer</button>
      </div>
      <div class="upload-progress" *ngIf="uploadingImage">
        Upload en cours...
      </div>
    </div>

    <div class="error-message" *ngIf="error">
      {{ error }}
    </div>

    <div class="form-actions">
      <a routerLink="/admin/voyages" class="btn-cancel">Annuler</a>
      <button type="submit" [disabled]="loading" class="btn-submit">
        {{ loading ? 'Enregistrement...' : (isEdit ? 'Modifier' : 'Créer') }}
      </button>
    </div>
  </form>
</div>
